<title>Taiom.Nunes — Gerenciador de Instagram</title>
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --ink: #1a2233;
    --ink-muted: #5b6472;
    --accent: #2f6f5e;
    --accent-soft: #e4f0ec;
    --border: #e2e5ea;
    --rule: #d7dbe1;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12161c;
      --surface: #1a2029;
      --ink: #edeff2;
      --ink-muted: #a0a8b4;
      --accent: #62c2a5;
      --accent-soft: #1e2e29;
      --border: #2a313c;
      --rule: #333b46;
    }
  }
  :root[data-theme="dark"] {
    --bg: #12161c;
    --surface: #1a2029;
    --ink: #edeff2;
    --ink-muted: #a0a8b4;
    --accent: #62c2a5;
    --accent-soft: #1e2e29;
    --border: #2a313c;
    --rule: #333b46;
  }
  :root[data-theme="light"] {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --ink: #1a2233;
    --ink-muted: #5b6472;
    --accent: #2f6f5e;
    --accent-soft: #e4f0ec;
    --border: #e2e5ea;
    --rule: #d7dbe1;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }

  .doc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .doc-top { height: 4px; background: var(--accent); }

  .doc-inner {
    padding: 48px clamp(24px, 6vw, 64px) 56px;
  }

  .eyebrow {
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin: 0 0 14px;
  }

  h1 {
    font-family: Georgia, "Times New Roman", ui-serif, serif;
    font-size: clamp(1.7rem, 4vw, 2.15rem);
    font-weight: 500;
    letter-spacing: -0.01em;
    margin: 0 0 16px;
    text-wrap: balance;
    color: var(--ink);
  }

  p.lead {
    color: var(--ink-muted);
    max-width: 56ch;
    margin: 0 0 40px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .links a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: var(--surface);
    padding: 18px 22px;
    color: var(--ink);
    text-decoration: none;
    transition: background-color 0.15s ease;
  }

  .links a:hover,
  .links a:focus-visible {
    background: var(--accent-soft);
  }

  .links a:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  .link-title { font-weight: 600; }

  .link-arrow {
    color: var(--accent);
    font-family: Georgia, serif;
  }

  .footer-note {
    color: var(--ink-muted);
    font-size: 0.82rem;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
  }

  .footer-note a { color: var(--accent); }

  @media (max-width: 520px) {
    .page { padding: 40px 16px 64px; }
    .doc-inner { padding: 36px 22px 44px; }
  }
</style>

<div class="page">
  <div class="doc">
    <div class="doc-top"></div>
    <div class="doc-inner">
      <p class="eyebrow">Taiom.Nunes</p>
      <h1>Gerenciamento de Instagram integrado à API do Meta</h1>
      <p class="lead">
        Documentos legais e informações de privacidade do aplicativo Taiom.Nunes.
      </p>

      <div class="links">
        <a href="./termos-de-servico.html">
          <span class="link-title">Termos de Serviço</span>
          <span class="link-arrow">→</span>
        </a>
        <a href="./exclusao-dados.html">
          <span class="link-title">Política de Exclusão de Dados</span>
          <span class="link-arrow">→</span>
        </a>
      </div>

      <p class="footer-note">
        Dúvidas: <a href="mailto:taweragt@gmail.com">taweragt@gmail.com</a>
      </p>
    </div>
  </div>
</div>
